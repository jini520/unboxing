name = "unboxing-worker"
main = "src/index.ts"
compatibility_date = "2026-06-16"

# 15분마다 배치 폴링 (docs/design.md: 적응형 폴링 주기, due 기반 단일 배치)
[triggers]
crons = ["*/15 * * * *"]

# D1: 먼저 `npx wrangler d1 create unboxing` 실행 후 출력된 database_id를 채울 것
[[d1_databases]]
binding = "DB"
database_name = "unboxing"
database_id = "2222ba46-7652-4085-8e6a-69604d2fc4b5"

# tracker.delivery 자격증명은 시크릿으로: `wrangler secret put DELIVERY_TRACKER_CLIENT_ID` (+ `..._CLIENT_SECRET`)
