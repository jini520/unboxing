name = "unboxing-worker"
main = "src/index.ts"
compatibility_date = "2026-06-16"

# 15분마다 배치 폴링 (docs/ARCHITECTURE.md "적응형 폴링 + cron 실행 모델")
[triggers]
crons = ["*/15 * * * *"]

# D1: 먼저 `npx wrangler d1 create unboxing` 실행 후 출력된 database_id를 채울 것
[[d1_databases]]
binding = "DB"
database_name = "unboxing"
database_id = "2222ba46-7652-4085-8e6a-69604d2fc4b5"

# Workers AI — 구매 캡처 분류(POST /classify-purchase, @cf/openai/gpt-oss-120b). 요청 시 실행($0, ADR-037).
# remote=true: AI 는 항상 원격 리소스라는 명시(로컬 dev 전용 플래그·배포 무관). 테스트는 vitest.config.mts
# remoteBindings:false 로 원격 세션을 끄므로 인증 없는 CI 에서도 안전하다(env.AI.run 미호출, 실호출은 step4 스모크).
[ai]
binding = "AI"
remote = true

# 비밀 아닌 설정값(var). secret 으로 다루지 말 것 — docs/ARCHITECTURE.md "환경변수 & 시크릿".
[vars]
# 심사용 데모 운송장(ADR-019) — 이 번호면 tracker.ts 가 외부 호출 없이 캔드 타임라인 반환.
# 형식 검증(^\d{9,14}$)·지원 carrier 대조 통과 + 실 운송장과 충돌 없는 예약값(14자리 0).
DEMO_TRACKING_NUMBER = "00000000000000"
# cron webhook (재)등록 sweep 의 콜백 베이스 URL(공개·비밀 아님, ADR-028). scheduled 엔 request origin 이 없어 이 값으로
# callbackUrl=`${base}/webhooks/track/<secret>` 를 만든다. 미설정 시 cron 등록 보류(폴백 폴링). 시크릿은 WEBHOOK_CALLBACK_SECRET.
WEBHOOK_CALLBACK_BASE_URL = "https://unboxing-worker.dev-jinni520.workers.dev"

# tracker.delivery 자격증명은 시크릿으로: `wrangler secret put DELIVERY_TRACKER_CLIENT_ID` (+ `..._CLIENT_SECRET`)
